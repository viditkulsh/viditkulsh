name: 📊 Generate Metrics Card

# Renders a metrics overview SVG to metrics/github-metrics.svg and commits it.
# Uses the built-in GITHUB_TOKEN — NO personal token or secret required.
# (Data is limited to public activity; that's fine for a public profile.)
on:
  schedule:
    - cron: "15 2 * * *" # daily
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: viditkulsh
          filename: metrics/github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_ignored: tex, html, css, scss
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
