name: 📊 Generate Metrics Card

# Renders a rich, plugin-driven metrics SVG and commits it to the repo root.
# Requires a secret: METRICS_TOKEN  (a classic PAT, scopes: repo, read:user, read:org)
#   Create at https://github.com/settings/tokens  →  add as repo secret METRICS_TOKEN
on:
  schedule:
    - cron: "15 2 * * *" # daily
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # ── Main overview card ──────────────────────────────────────────────
      - name: Overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: viditkulsh
          filename: metrics/github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_ignored: tex, html, css
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      # ── Isometric (3D-ish) calendar + achievements ──────────────────────
      - name: Isocalendar + achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: viditkulsh
          filename: metrics/github-metrics-iso.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
