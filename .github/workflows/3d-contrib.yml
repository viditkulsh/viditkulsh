name: 🧊 Generate 3D Contribution Calendar

# Renders an isometric "3D" version of your contribution graph and commits
# the SVGs to the `profile-3d-contrib/` folder on the default branch.
on:
  schedule:
    - cron: "30 1 * * *" # daily
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution profile
        # Emits several variants into profile-3d-contrib/ (night-rainbow, season, gitblock, ...)
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: update 3D contribution calendar" || echo "no changes"
          git push
