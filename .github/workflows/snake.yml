name: 🐍 Generate Snake Animation

# Builds the contribution-graph "snake" SVG (light + dark) and pushes it
# to the `output` branch, where the README's <img> tags read it from.
on:
  schedule:
    - cron: "0 */12 * * *" # twice a day
  workflow_dispatch: # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake.gif?color_snake=orange&color_dots=#bfd0d0,#8b5cf6,#a855f7,#ec4899,#6366f1

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
