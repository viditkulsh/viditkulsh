name: ⏱️ WakaTime Readme Stats

# Injects weekly coding-time stats into README between the
# <!--START_SECTION:waka--> ... <!--END_SECTION:waka--> markers.
#
# Required secrets:
#   WAKATIME_API_KEY  → from https://wakatime.com/settings/account (also install the
#                        WakaTime editor plugin so time is actually tracked)
#   GH_TOKEN          → a classic PAT with `repo` scope (you can reuse METRICS_TOKEN's value)
on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "True"
          SHOW_EDITORS: "True"
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "False"
          LOCALE: "en"
